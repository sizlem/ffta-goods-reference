<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FFT-A Goods Reference</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2933;
      --line: #d8d6cb;
      --accent: #9b3f2f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      padding-bottom: 92px;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(25px, 5vw, 32px);
      line-height: 1.2;
      letter-spacing: 0;
    }
    .lead {
      font-size: clamp(16px, 3.6vw, 18px);
      line-height: 1.7;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px;
      border-radius: 8px;
    }
    .items {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }
    details.item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    details.item[open] {
      border-color: #b8b3a4;
    }
    summary.item-summary {
      list-style: none;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(230px, 380px);
      gap: 14px;
      align-items: center;
      padding: 14px;
      cursor: pointer;
    }
    summary.item-summary::-webkit-details-marker {
      display: none;
    }
    .item-title {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 800;
    }
    .item-text {
      font-size: 15px;
      line-height: 1.5;
    }
    .item-hint {
      margin-top: 8px;
      color: #64707d;
      font-size: 13px;
    }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(76px, 1fr));
      gap: 8px;
    }
    .thumbs img,
    figure img {
      width: 100%;
      object-fit: contain;
      background: #fff;
      cursor: zoom-in;
    }
    .thumbs img {
      height: 118px;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .item-detail {
      border-top: 1px solid var(--line);
      padding: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }
    figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }
    figure img {
      height: 230px;
      display: block;
    }
    figcaption {
      padding: 10px 12px 12px;
      font-size: 14px;
      line-height: 1.45;
      min-height: 58px;
    }
    .highlight {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .language-toggle {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      width: min(320px, calc(100vw - 32px));
      padding: 6px;
      background: rgba(31, 41, 51, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(10px);
    }
    .language-toggle button {
      min-width: 0;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .language-toggle button[aria-pressed="true"] {
      background: #fff;
      color: var(--ink);
    }
    .zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(12, 18, 24, 0.82);
    }
    .zoom-overlay.is-open {
      display: grid;
    }
    .zoom-panel {
      width: min(960px, 100%);
      max-height: calc(100vh - 36px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 10px;
    }
    .zoom-panel img {
      width: 100%;
      max-height: calc(100vh - 112px);
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
      cursor: zoom-out;
    }
    .zoom-caption {
      min-height: 24px;
      color: #fff;
      font-size: 15px;
      line-height: 1.45;
      text-align: center;
    }
    .share-footer {
      margin-top: 22px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .share-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 16px;
      align-items: center;
    }
    .share-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 800;
    }
    .share-text,
    .share-contact,
    .share-note {
      font-size: 14px;
      line-height: 1.6;
    }
    .share-contact a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .share-contact a:hover {
      text-decoration: underline;
    }
    .share-qr {
      display: grid;
      gap: 8px;
      justify-items: center;
    }
    .share-qr img {
      width: 100%;
      max-width: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }
    @media (max-width: 680px) {
      summary.item-summary {
        grid-template-columns: 1fr;
      }
      .share-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 560px) {
      main { padding: 18px 14px 24px; }
      .thumbs img { height: 88px; }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      figure img { height: 178px; }
      figcaption {
        font-size: 12px;
        min-height: 68px;
      }
      .language-toggle {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }
    }
    @media print {
      body {
        background: #fff;
        padding-bottom: 0;
      }
      main { padding: 12mm; }
      .lead, details.item, figure { break-inside: avoid; }
      .language-toggle { display: none; }
    }
  </style>
</head>

    const buttons = document.querySelectorAll("[data-lang]");
    const translatable = document.querySelectorAll("[data-i18n]");
    const zoomOverlay = document.getElementById("zoomOverlay");
    const zoomImage = document.getElementById("zoomImage");
    const zoomCaption = document.getElementById("zoomCaption");

    function setLanguage(lang) {
      const dict = translations[lang] || translations.ja;
      document.documentElement.lang = lang;
      document.title = dict.title;
      translatable.forEach((node) => {
        node.innerHTML = dict[node.dataset.i18n] || "";
      });
      buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.lang === lang));
      });
      localStorage.setItem("ffta-reference-language", lang);
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    function imageCaption(image) {
      const figureCaption = image.closest("figure")?.querySelector("figcaption")?.textContent?.trim();
      if (figureCaption) return figureCaption;
      const item = image.closest(".item");
      return item?.querySelector(".item-title")?.textContent?.trim() || "";
    }

    function closeZoom() {
      zoomOverlay.classList.remove("is-open");
      zoomOverlay.setAttribute("aria-hidden", "true");
      zoomImage.removeAttribute("src");
      zoomCaption.textContent = "";
    }

    function openZoom(image) {
      zoomImage.src = image.currentSrc || image.src;
      zoomImage.alt = imageCaption(image);
      zoomCaption.textContent = imageCaption(image);
      zoomOverlay.classList.add("is-open");
      zoomOverlay.setAttribute("aria-hidden", "false");
    }

    document.querySelectorAll("main img").forEach((image) => {
      image.addEventListener("click", (event) => {
        event.preventDefault();
        if (zoomOverlay.classList.contains("is-open") && zoomImage.src === (image.currentSrc || image.src)) {
          closeZoom();
        } else {
          openZoom(image);
        }
      });
    });

    zoomOverlay.addEventListener("click", closeZoom);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeZoom();
    });

    setLanguage(localStorage.getItem("ffta-reference-language") || "ja");
  </script>
